<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinémas indépendants Lyon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#111010; --bg2:#191817; --bg3:#201f1d; --bg4:#272523;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.13);
  --gold:#c9a84c; --gold-dim:#7a6430;
  --text:#f0ebe0; --text-dim:#7a7060; --text-mid:#a09080;
  --accent:#e8603a; --green:#4fa06a;
  --compact-red:#e00000; --compact-times:#9b9b9b;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
header{
  padding:0 0 0 28px;display:flex;align-items:stretch;justify-content:space-between;
  height:104px;position:sticky;top:0;z-index:200;
  background:rgba(17,16,16,.96);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.header-brand{display:flex;flex-direction:column;justify-content:center;gap:3px;}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);text-decoration:none;line-height:1.2;}
.logo em{font-style:italic;color:var(--text-mid);font-weight:400;}
.header-subtitle{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);}
.header-right{display:flex;align-items:stretch;gap:0;border-left:1px solid var(--border);}
.h-tab{
  padding:0 28px;display:flex;align-items:center;
  font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-dim);background:none;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  border-bottom:2px solid transparent;position:relative;bottom:-1px;
  transition:color .2s,border-color .2s;
}
.h-tab + .h-tab{border-left:1px solid var(--border);}
.h-tab.active{color:var(--text);border-bottom-color:var(--gold);}
.h-tab:hover:not(.active){color:var(--text-mid);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:1fr 440px;max-width:1260px;margin:0 auto;min-height:calc(100vh - 64px);}
.main{border-right:1px solid var(--border);}
.side{background:var(--bg);}

/* ── SUB-HEADER (date + cinema selector) ── */
.sub-header{width:100%;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:104px;z-index:110;}
.sub-header .date-bar{max-width:1260px;margin:0 auto;position:static;border-bottom:none;}

/* ── TABS (events list) ── */
.tab{padding:18px 0;margin-right:28px;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);cursor:pointer;background:none;border:none;border-bottom:1.5px solid transparent;position:relative;top:1px;font-family:'DM Sans',sans-serif;transition:color .2s,border-color .2s;}
.tab.active{color:var(--text);border-bottom-color:var(--gold);}
.tab:hover:not(.active){color:var(--text-mid);}

/* ── DATE BAR ── */
.date-bar{padding:20px 28px;overflow:visible;}
.date-nav-cinema-row{display:flex;align-items:center;gap:10px;overflow:visible;}
.cinema-pills-inline{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;white-space:nowrap;flex:1;min-width:0;}
.cinema-pills-inline::-webkit-scrollbar{display:none;}
.cinema-sep{width:1px;height:24px;background:var(--border);flex-shrink:0;}
.date-day-row{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.date-pills{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;flex-shrink:0;}
.date-pills::-webkit-scrollbar{display:none;}
.day-btn{
  display:flex;align-items:center;gap:8px;
  padding:7px 16px;border-radius:100px;
  border:1px solid var(--text);background:var(--text);
  cursor:pointer;font-family:'DM Sans',sans-serif;color:#111;
  font-weight:500;font-size:13px;
  transition:all .18s;white-space:nowrap;
}
.day-btn:hover{background:var(--text-mid);border-color:var(--text-mid);}
.day-btn svg{flex-shrink:0;opacity:.5;}
.day-nav-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:transparent;
  cursor:pointer;color:var(--text-dim);display:flex;align-items:center;justify-content:center;
  transition:all .18s;
}
.day-nav-btn:hover:not(:disabled){border-color:var(--border2);color:var(--text);}
.day-nav-btn:disabled{opacity:.35;cursor:not-allowed;}
.day-selector-wrap{position:relative;z-index:200;}
.day-dropdown{
  position:absolute;top:calc(100% + 6px);left:0;
  background:var(--bg3);border:1px solid var(--border2);border-radius:12px;
  padding:8px;min-width:220px;max-height:300px;overflow-y:auto;
  box-shadow:0 16px 48px rgba(0,0,0,.7);z-index:300;
}
.day-dropdown-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-dim);
  transition:background .15s;
}
.day-dropdown-item:hover{background:rgba(255,255,255,.06);color:var(--text);}
.day-dropdown-item.active{background:var(--gold);color:#111;}
.day-dropdown-item .d-num{font-family:'Playfair Display',serif;font-weight:700;min-width:28px;}
.d-pill{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:8px 16px;border-radius:100px;
  border:1px solid var(--border);background:transparent;
  cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text-dim);
  transition:all .18s;white-space:nowrap;
}
.d-pill:hover{border-color:var(--border2);color:var(--text);}
.d-pill.active{background:var(--text);border-color:var(--text);color:#111;}
.p-day{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;}
.p-num{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;line-height:1;}
.p-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0;flex-shrink:0;}
.d-pill.has-s .p-dot{opacity:1;}
.d-pill.active .p-dot{background:rgba(0,0,0,.35);}

/* ── CINEMA PILLS ── */
.c-pill{
  flex-shrink:0;padding:8px 14px;border-radius:100px;
  border:1px solid var(--border);background:transparent;
  cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;
  letter-spacing:.07em;text-transform:uppercase;color:var(--text-dim);
  transition:all .18s;white-space:nowrap;
}
.c-pill:hover{border-color:var(--border2);color:var(--text);}
.c-pill.active{background:var(--gold);border-color:var(--gold);color:#111;font-weight:500;}

/* ── VIEW TOGGLES ── */
.view-toggles{padding:10px 28px;display:flex;align-items:center;gap:10px;background:transparent;border-bottom:1px solid transparent;color:transparent;}
.view-icons{display:flex;gap:4px;}
.view-icon-btn{
  width:34px;height:34px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  cursor:pointer;color:var(--text-dim);display:flex;align-items:center;justify-content:center;
  transition:all .18s;
}
.view-icon-btn:hover{border-color:var(--border2);color:var(--text);}
.view-icon-btn.active{background:#191817;border-color:#443D36;color:#D0A636;}
.toggle-lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);}
.mode-pill{
  padding:7px 18px;border-radius:100px;
  border:1px solid var(--border);background:transparent;
  cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;
  font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);
  transition:all .18s;
}
.mode-pill:hover{border-color:var(--border2);color:var(--text);}
.mode-pill.active{background:#191817;border-color:#443D36;color:#D0A636;}
.view-mode-pills{display:flex;gap:8px;}
.view-mode-pills.hidden{display:none!important;}

/* ── COMPACT LIST ── */
.compact-list{padding:12px 20px 40px;}
.compact-section{margin-bottom:20px;}
.compact-section:last-child{margin-bottom:0;}
.compact-section-header{
  font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--compact-red);margin-bottom:10px;
}
.compact-section-header em{font-style:italic;font-weight:400;text-transform:lowercase;color:inherit;}
.compact-row{
  display:grid;grid-template-columns:1fr 110px 1fr;
  padding:10px 0;border-bottom:1px solid var(--border);
  align-items:center;gap:0;cursor:pointer;transition:background .15s;
}
.compact-row:hover{background:rgba(255,255,255,.03);}
.compact-row:last-child{border-bottom:none;}
.compact-row.active{background:rgba(201,168,76,.12);}
.compact-title{font-size:14px;font-weight:700;text-transform:uppercase;color:var(--text);padding-right:12px;}
.compact-poster-slot{width:110px;min-height:0;display:flex;align-items:center;justify-content:center;position:relative;}
.compact-times{font-size:11px;color:var(--compact-times);line-height:1.4;padding-left:12px;}
.week-day-section{margin-bottom:28px;}
.week-day-section:last-child{margin-bottom:0;}
.week-day-header{
  font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:12px;padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.week-day-header.today{color:var(--gold);}

/* ── COMPACT WEEK TABLE ── */
.compact-list.compact-week{padding:0;overflow-x:auto;}
.cw-grid{
  display:grid;
  min-width:max-content;
  border-bottom:1px solid var(--border);
}
/* sticky first column */
.cw-corner,
.cw-film-label,
.cw-cinema-label{
  position:sticky;left:0;z-index:5;
  background:var(--bg);
}
.cw-corner{z-index:10;background:var(--bg);}

/* header row */
.cw-corner{
  padding:14px 20px;
  border-bottom:2px solid var(--border);
  border-right:1px solid var(--border2);
}
.cw-day-head{
  padding:12px 10px;text-align:center;
  font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-dim);border-bottom:2px solid var(--border);
  border-right:1px solid var(--border);
  white-space:nowrap;
}
.cw-day-head.today{
  background:var(--gold);color:#111;font-weight:700;border-bottom-color:var(--gold);
}

/* cinema header row */
.cw-cinema-label{
  padding:10px 20px;
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--compact-red);
  border-bottom:1px solid var(--border);border-right:1px solid var(--border2);
  background:var(--bg);
}
.cw-cinema-label em{font-style:italic;font-weight:400;text-transform:lowercase;}
.cw-cinema-spacer{
  border-bottom:1px solid var(--border);border-right:1px solid var(--border);
  background:rgba(255,255,255,.015);
}

/* film row */
.cw-film-label{
  padding:10px 20px;cursor:pointer;
  font-size:13px;font-weight:700;text-transform:uppercase;color:var(--text);
  border-bottom:1px solid var(--border);border-right:1px solid var(--border2);
  line-height:1.35;transition:background .15s;
}
.cw-film-label:hover{background:rgba(255,255,255,.04);}
.cw-film-label.active{background:rgba(201,168,76,.12);}
.cw-times{
  padding:10px 10px;text-align:center;
  font-size:11px;color:var(--compact-times);line-height:1.7;
  border-bottom:1px solid var(--border);border-right:1px solid var(--border);
  vertical-align:middle;cursor:pointer;transition:background .15s;
  white-space:pre-line;
}
.cw-times:hover{background:rgba(255,255,255,.03);}
.cw-times:last-child,.cw-day-head:last-child,.cw-cinema-spacer:last-child{border-right:none;}
.cw-times.has-time{color:var(--text-mid);}
.cw-times .t-past{opacity:.4;}
.cw-times .t-soon{color:var(--accent);}

@media(max-width:820px){
  .cw-film-label{padding:8px 12px;font-size:12px;}
  .cw-corner,.cw-cinema-label{padding:8px 12px;}
  .cw-times{padding:8px 6px;font-size:10px;}
  .cw-day-head{padding:10px 6px;font-size:9px;}
}
.week-day-films{display:flex;flex-direction:column;gap:16px;}
@media(max-width:820px){
  .view-toggles{padding:8px 16px;gap:8px;}
  .compact-row{grid-template-columns:1fr 1fr;}
  .compact-poster-slot{display:none;}
  .compact-times{margin-top:2px;}
  .compact-day-column{min-width:180px;}
}
@media(max-width:480px){
  .compact-list{padding:8px 12px 32px;}
  .compact-title{font-size:13px;}
  .compact-times{font-size:10px;}
}

/* ── COMPACT POSTER TOOLTIP ── */
#compactPosterTooltip{
  position:fixed;width:110px;height:165px;border-radius:10px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.08);
  pointer-events:none;opacity:0;
  transform:scale(.95) rotate(0deg);
  transition:opacity .32s cubic-bezier(.25,.46,.45,.94),transform .32s cubic-bezier(.25,.46,.45,.94);
  z-index:500;
}
#compactPosterTooltip.visible{opacity:1;transform:scale(1) rotate(-5deg);}
#compactPosterTooltip .poster-layer{
  position:absolute;inset:0;opacity:0;
  transition:opacity .22s ease,transform .22s ease;
}
#compactPosterTooltip .poster-layer.from-top{transform:translateY(-8px);}
#compactPosterTooltip .poster-layer.from-bottom{transform:translateY(8px);}
#compactPosterTooltip .poster-layer.active{opacity:1;transform:translateY(0);}
#compactPosterTooltip .poster-layer img{width:100%;height:100%;object-fit:cover;display:block;}

/* ── CTX BAR ── */
.ctx{padding:9px 28px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text-dim);border-bottom:1px solid var(--border);}
.ctx-date{color:var(--text-mid);font-size:12px;}
.ctx a{color:var(--gold-dim);text-decoration:none;}
.ctx a:hover{color:var(--gold);}

/* ── CINEMA CHIP (slot row label in "Tous" mode) ── */
.card-cinema-chip{
  flex-shrink:0;min-width:82px;height:56px;
  display:flex;align-items:center;justify-content:center;
  border-radius:12px;border:1px solid #3a3a3a;
  background:rgba(255,255,255,.04);color:var(--text-mid);
  font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;
  padding:0 12px;
}
/* tiny version label inside time button */
.slot-ver{font-size:10px;opacity:.45;margin-left:5px;letter-spacing:.05em;font-family:'DM Sans',sans-serif;}

/* ── FILM CARDS (design maquette) ── */
.film-list{padding:16px 20px 40px;display:flex;flex-direction:column;gap:16px;}

.film-card{
  border-radius:12px;overflow:visible;cursor:pointer;
  background:#0b0b0b;border:1px solid #3a3a3a;
  transition:transform .2s ease,box-shadow .2s ease,border-color .2s;
  display:flex;gap:24px;padding:20px;align-items:flex-start;
}
.film-card:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.6);border-color:#4a4a4a;}
.film-card.active{border-color:rgba(201,168,76,.5);box-shadow:0 0 0 1px rgba(201,168,76,.2);}

/* poster — 160×240, ratio 2:3 */
.card-poster-wrap{flex-shrink:0;}
.card-poster{
  width:160px;height:240px;border-radius:10px;
  object-fit:cover;display:block;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  background:#111;
}

/* card body */
.card-body{flex:1;min-width:0;padding-top:0px;padding-bottom:0px;}
.card-header{margin-bottom:8px;}
.card-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,40px);font-weight:300;color:#fff;line-height:1.15;}
.card-meta{font-size:16px;color:#dcdcdc;margin-top:8px;line-height:1.5;}
.card-actors{font-size:13px;color:var(--text-dim);margin-top:4px;line-height:1.4;}

/* grid langue + créneaux — une ligne par version */
.card-slots{display:flex;flex-direction:column;gap:12px;margin-top:16px;}
.card-slot-row{display:flex;flex-wrap:wrap;align-items:center;gap:12px;}
/* chip langue — bordure dashed */
.card-lang-chip{
  flex-shrink:0;min-width:100px;height:56px;
  display:flex;align-items:center;justify-content:center;
  border-radius:12px;border:2px dashed #4a4a4a;
  background:transparent;color:#fff;font-size:18px;font-weight:500;
  padding:0 18px;
}
/* bouton créneau */
.card-time-btn{
  font-family:'DM Mono',monospace;font-size:18px;font-weight:400;
  height:56px;min-width:100px;padding:0 24px;
  border-radius:14px;border:1px solid #3a3a3a;
  background:#2b2b2b;color:#fff;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.card-time-btn:hover{background:#333;border-color:#4a4a4a;}
.card-time-btn.past{color:#666;opacity:.5;cursor:default;}
.card-time-btn.soon{border-color:var(--accent);color:var(--accent);background:rgba(232,96,58,.1);}

/* skeleton */
.sk-card{border-radius:12px;border:1px solid #3a3a3a;background:#0b0b0b;display:flex;gap:24px;padding:20px;}
.sk-poster{width:160px;height:240px;border-radius:10px;background:#111;animation:sh 1.6s ease-in-out infinite;flex-shrink:0;}
.sk-foot{display:flex;flex-direction:column;gap:8px;flex:1;}
.sk-line{border-radius:3px;background:#1a1a1a;animation:sh 1.6s ease-in-out infinite;}
@keyframes sh{0%,100%{opacity:.4}50%{opacity:.75}}

/* empty-day message */
.empty-day{
  margin:24px 20px;padding:28px 24px;
  border-radius:var(--r);border:1px solid var(--border);
  background:var(--bg2);text-align:center;
}
.empty-day-icon{font-size:28px;margin-bottom:12px;}
.empty-day-title{font-family:'Playfair Display',serif;font-size:17px;font-style:italic;color:var(--text-mid);margin-bottom:6px;}
.empty-day-sub{font-size:12px;color:var(--text-dim);line-height:1.7;margin-bottom:18px;}
.empty-day-btn{
  display:inline-flex;align-items:center;gap:8px;
  font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  padding:9px 18px;border-radius:100px;
  background:var(--text);color:#111;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:opacity .2s;
}

/* ── DETAIL PANEL ── */
.detail-wrap{position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px;}

.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--text-dim);font-size:13px;text-align:center;padding:40px;}
.detail-empty svg{opacity:.1;margin-bottom:4px;}
.detail-empty strong{font-family:'Playfair Display',serif;font-size:17px;color:var(--text-mid);font-weight:400;font-style:italic;}

.d-hero{position:sticky;top:0;height:calc(100vh - 64px);overflow:hidden;z-index:0;flex-shrink:0;}
.d-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(17,16,16,.15) 0%,rgba(17,16,16,.65) 55%,var(--bg) 100%);z-index:1;pointer-events:none;}
.d-back{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.3) saturate(.5) blur(20px);transform:scale(1.1);}
.d-back-ph{height:100%;background:linear-gradient(135deg,var(--bg3),var(--bg));}
.d-score{position:absolute;top:14px;right:14px;z-index:2;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:9px 14px;text-align:center;backdrop-filter:blur(8px);}
.d-score-num{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--gold);line-height:1;display:block;}
.d-score-lbl{font-size:10px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;}

.d-body{position:relative;z-index:1;margin-top:calc(160px - (100vh - 64px));padding:28px 28px 40px;}
.d-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1.15;margin-bottom:4px;}
.d-orig{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;color:var(--text-dim);margin-bottom:18px;}
.d-crew{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:20px;}
.d-ci .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:3px;}
.d-ci .val{font-size:16px;color:var(--text);}
.d-genres{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}

// Semaine mer→mar : retourne { start (mercredi), days [Date x 7] }
function getWeekBounds(ref) {
  const d = new Date(ref); d.setHours(0,0,0,0);
  const dow = d.getDay(); // 0=Dim, 3=Mer
  const offset = dow >= 3 ? dow - 3 : dow + 4;
  const start = addDays(d, -offset);
  return { start, days: [0,1,2,3,4,5,6].map(i => addDays(start, i)) };
}

  const { start, days } = getWeekBounds(today);
  const mer = start;
  const mar = days[6];
  const fmt = d => d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
  el.textContent = 'SEMAINE DU ' + fmt(mer).toUpperCase() + ' AU ' + fmt(mar).toUpperCase();

let omdbCache = {};

async function fetchTMDBByImdbId(imdbId) {
  if (!TMDB_KEY || tmdbCache[imdbId] !== undefined) return tmdbCache[imdbId];
  try {
    const r1 = await fetch(`https://api.themoviedb.org/3/find/${imdbId}?api_key=${TMDB_KEY}&external_source=imdb_id`);
    if (!r1.ok) return tmdbCache[imdbId] = null;
    const d1 = await r1.json();
    const movie = (d1.movie_results || [])[0];
    if (!movie || !movie.id) return tmdbCache[imdbId] = null;
    let cast = null;
    const r2 = await fetch(`https://api.themoviedb.org/3/movie/${movie.id}/credits?api_key=${TMDB_KEY}`);
    if (r2.ok) {
      const d2 = await r2.json();
      const names = (d2.cast || []).slice(0, 3).map(c => c.name).filter(Boolean);
      cast = names.length ? names.join(', ') : null;
    }
    return tmdbCache[imdbId] = {
      overview: movie.overview || null,
      poster: movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : null,
      note: movie.vote_average != null ? movie.vote_average : null,
      cast,
    };
  } catch { return tmdbCache[imdbId] = null; }
}

async function fetchTMDBByTitle(titre, annee) {
  if (!TMDB_KEY) return null;
  const key = `${titre}|${annee || ''}`;
  if (tmdbByTitleCache[key] !== undefined) return tmdbByTitleCache[key];
  try {
    let url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(titre)}`;
    if (annee) url += `&year=${annee}`;
    const r1 = await fetch(url);
    if (!r1.ok) return tmdbByTitleCache[key] = null;
    const d1 = await r1.json();
    const movie = (d1.results || [])[0];
    if (!movie || !movie.id) return tmdbByTitleCache[key] = null;
    let cast = null;
    const r2 = await fetch(`https://api.themoviedb.org/3/movie/${movie.id}/credits?api_key=${TMDB_KEY}`);
    if (r2.ok) {
      const d2 = await r2.json();
      const names = (d2.cast || []).slice(0, 3).map(c => c.name).filter(Boolean);
      cast = names.length ? names.join(', ') : null;
    }
    const r3 = await fetch(`https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB_KEY}`);
    let imdbId = null;
    if (r3.ok) {
      const d3 = await r3.json();
      imdbId = d3.imdb_id || null;
    }
    return tmdbByTitleCache[key] = {
      overview: movie.overview || null,
      poster: movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : null,
      note: movie.vote_average != null ? movie.vote_average : null,
      cast,
      imdbId,
    };
  } catch { return tmdbByTitleCache[key] = null; }
}

async function fetchOMDb(imdbId) {
  if (imdbId in omdbCache) return omdbCache[imdbId];
  try {
    const url = `https://www.omdbapi.com/?i=${imdbId}&apikey=${OMDB_KEY}&plot=full`;
    const r = await fetch(url);
    if (!r.ok) return omdbCache[imdbId] = null;
    const d = await r.json();
    if (d.Response === 'False') return omdbCache[imdbId] = null;
    return omdbCache[imdbId] = d;
  } catch { return omdbCache[imdbId] = null; }
}

async function fetchOMDbByTitle(titre, annee) {
  const key = `${titre}|${annee || ''}`;
  if (key in omdbByTitleCache) return omdbByTitleCache[key];
  try {
    let url = `https://www.omdbapi.com/?t=${encodeURIComponent(titre)}&apikey=${OMDB_KEY}&type=movie`;
    if (annee) url += `&y=${annee}`;
    const r = await fetch(url);
    if (!r.ok) return omdbByTitleCache[key] = null;
    const d = await r.json();
    // If not found with year, retry without year
    if (d.Response === 'False' && annee) {
      const r2 = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(titre)}&apikey=${OMDB_KEY}&type=movie`);
      if (r2.ok) {
        const d2 = await r2.json();
        if (d2.Response === 'True') return omdbByTitleCache[key] = d2;
      }
    }
    if (d.Response === 'False') return omdbByTitleCache[key] = null;
    return omdbByTitleCache[key] = d;
  } catch { return omdbByTitleCache[key] = null; }
}

async function enrichFilm(f) {
  const titreOrig = f.titreOriginal || null;
  const titreFr   = f.titre;
  let t = null, o = null;

  // 1. TMDB en priorité (si clé configurée)
  if (TMDB_KEY) {
    if (f.imdbId) t = await fetchTMDBByImdbId(f.imdbId);
    if (!t) t = await fetchTMDBByTitle(titreOrig || titreFr, f.annee);
    // Si pas de résultat avec le titre original, essayer le titre français
    if (!t && titreOrig && titreOrig !== titreFr) t = await fetchTMDBByTitle(titreFr, f.annee);
    if (t) {
      if (t.imdbId && !f.imdbId) f.imdbId = t.imdbId;
      if (!f._poster   && t.poster)           f._poster   = t.poster;
      if (!f.note      && t.note != null)      f.note      = t.note;
      if (!f._cast     && t.cast)              f._cast     = t.cast;
      if (!f._synopsis && t.overview)          f._synopsis = t.overview;
    }
  }

  // 2. OMDb en fallback pour les champs encore manquants (dont affiche)
  const needsMore = !f._cast || !f._synopsis || !f._poster;
  if (needsMore) {
    if (f.imdbId) o = await fetchOMDb(f.imdbId);
    // Essai par titre original puis français si pas d'imdbId ou OMDb vide
    if (!o && titreOrig) o = await fetchOMDbByTitle(titreOrig, f.annee);
    if (!o && titreFr !== titreOrig) o = await fetchOMDbByTitle(titreFr, f.annee);
    if (o) {
      if (!f.imdbId && o.imdbID)                                         f.imdbId    = o.imdbID;
      if (!f._poster   && o.Poster   && o.Poster   !== 'N/A')            f._poster   = o.Poster;
      if (!f.note      && o.imdbRating && o.imdbRating !== 'N/A')        f.note      = parseFloat(o.imdbRating);
      if (!f._cast     && o.Actors   && o.Actors   !== 'N/A')            f._cast     = o.Actors;
      if (!f._synopsis && o.Plot     && o.Plot     !== 'N/A')            f._synopsis = o.Plot;
    }
  }
}

function actorsTop3(castStr) {
  if (!castStr || typeof castStr !== 'string') return null;
  const list = castStr.split(',').map(s => s.trim()).filter(Boolean);
  return list.slice(0, 3).join(', ') || null;
}

// LOAD ALL
// 1. Supabase (source principale)
// 2. programme.json (fallback si Supabase indisponible)
// 3. FILMS_DATA (fallback démo)
// ═══════════════════════════════════════════════════════════
function toHeure(h) {
  if (!h) return '00:00';
  const s = String(h);
  return s.length >= 5 ? s.slice(0, 5) : s; // "11:15:00" → "11:15"
}

function toFrontendFilm(f) {
  return {
    ...f,
    note:    f.imdbRating ?? f.note ?? null,
    _poster: f.poster     ?? null,
    _cast:   f.cast       ?? null,
    _synopsis: f.synopsis ?? null,
    color:   '#1a1a1a',
    cinema:  f.cinema     || 'Le Comoedia',
    _sd: (f.seances || []).map(s => ({
      h: toHeure(s.heure),
      v: s.version || 'VF',
      date: new Date(s.date + 'T00:00:00'),
      resa_url: s.resa_url || null,
      cinema: f.cinema || 'Le Comoedia',
    })),
  };
}

async function loadFromSupabase() {
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) return null;
  if (typeof supabase === 'undefined') {
    console.warn('[CinémasLyon] Script Supabase non chargé');
    return null;
  }
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const { data, error } = await sb
    .from('seances')
    .select(`
      date,
      heure,
      version,
      resa_url,
      films (
        id,
        titre,
        titre_original,
        annee,
        realisateur,
        duree,
        genres,
        synopsis,
        imdb_id,
        poster,
        imdb_rating,
        cast,
        source
      ),
      cinemas (name)
    `);

  if (error || !data?.length) return null;

  const byKey = {};
  for (const row of data) {
    const film = row.films;
    const cinemaName = row.cinemas?.name || 'Le Comoedia';
    if (!film) continue;
    const key = `${film.id}-${cinemaName}`;
    if (!byKey[key]) {
      byKey[key] = {
        titre: film.titre,
        titreOriginal: film.titre_original,
        annee: film.annee,
        realisateur: film.realisateur,
        duree: film.duree,
        genres: film.genres || [],
        synopsis: film.synopsis,
        imdbId: film.imdb_id,
        poster: film.poster,
        imdbRating: film.imdb_rating,
        cast: film.cast,
        source: film.source,
        cinema: cinemaName,
        seances: [],
      };
    }
    byKey[key].seances.push({
      date: row.date,
      heure: row.heure,
      version: row.version,
      resa_url: row.resa_url,
    });
  }

  return Object.values(byKey).map(toFrontendFilm);
}

async function loadFromJson() {
  const res = await fetch('./programme.json');
  if (!res.ok) return null;
  const data = await res.json();
  return (data.films || []).map(f => toFrontendFilm({
    ...f,
    seances: f.seances || [],
  }));
}

async function loadAll() {
  const today = new Date(); today.setHours(0,0,0,0);

  // ── 1. Supabase (source principale) ──
  if (SUPABASE_URL && SUPABASE_ANON_KEY) {
    try {
      const films = await loadFromSupabase();
      if (films?.length) {
        await Promise.all(films.map(enrichFilm));
        console.info(`[CinémasLyon] Supabase chargé — ${films.length} films`);
        return films;
      }
      if (films && films.length === 0) console.info('[CinémasLyon] Supabase vide, fallback programme.json');
    } catch (e) {
      console.warn('[CinémasLyon] Supabase erreur, fallback programme.json:', e?.message || e);
    }
  }

  // ── 2. programme.json (fallback) ──
  try {
    const films = await loadFromJson();
    if (films?.length) {
      await Promise.all(films.map(enrichFilm));
      console.info(`[CinémasLyon] programme.json chargé — ${films.length} films`);
      return films;
    }
  } catch (e) {
    console.warn('[CinémasLyon] programme.json indisponible:', e?.message || e);
  }

  // ── 3. FILMS_DATA (fallback démo) ──
  console.info('[CinémasLyon] Données de démonstration + TMDB/OMDb');
  const films = FILMS_DATA.map(f => ({
    ...f,
    cinema: f.cinema || 'Le Comoedia',
    _sd: f.seances.map(s => ({ ...s, date: addDays(today, s.j) })),
  }));
  await Promise.all(films.map(enrichFilm));
  return films;
}

// Fallback si loadAll retourne vide (évite écran blanc)
function ensureFilms(films) {
  if (films?.length) return films;
  const today = new Date(); today.setHours(0,0,0,0);
  return FILMS_DATA.map(f => ({
    ...f,
    cinema: f.cinema || 'Le Comoedia',
    _sd: f.seances.map(s => ({
      ...s,
      date: addDays(today, s.j),
      cinema: f.cinema || 'Le Comoedia',
    })),
  }));
}

const JOURS_SEMAINE = ['Mer','Jeu','Ven','Sam','Dim','Lun','Mar'];

function getDaysUntilNextTuesday() {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow = today.getDay();
  const daysToTuesday = dow <= 2 ? 2 - dow : 9 - dow;
  const days = [];
  for (let i = 0; i <= daysToTuesday; i++) days.push(addDays(today, i));
  return days;
}

function updateDayButton() {
  const today = new Date(); today.setHours(0,0,0,0);
  const isToday = sameDay(selDate, today);
  const label = isToday ? 'AUJ ' + selDate.getDate() : JOURS[selDate.getDay()] + ' ' + selDate.getDate();
  const el = document.getElementById('dayBtnLabel');
  if (el) el.textContent = label;
  const prevBtn = document.getElementById('dayNavPrev');
  if (prevBtn) prevBtn.disabled = isToday;
}

function buildDayDropdown() {
  const el = document.getElementById('dayDropdown');
  if (!el) return;
  const days = getDaysUntilNextTuesday();
  const today = new Date(); today.setHours(0,0,0,0);
  el.innerHTML = days.map(d => {
    const isToday = sameDay(d, today);
    const isSel = sameDay(d, selDate);
    const label = isToday ? 'Aujourd\'hui' : d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
    return `<div class="day-dropdown-item${isSel?' active':''}" data-day="${dKey(d)}" onclick="pickDay('${dKey(d)}')">
      <span class="d-num">${d.getDate()}</span>
      <span>${label}</span>
    </div>`;
  }).join('');
}

function pickDay(dayKey) {
  const [y,m,d] = dayKey.split('-').map(Number);
  selDate = new Date(y, m-1, d);
  document.getElementById('dayDropdown').classList.add('hidden');
  updateDayButton();
  buildDayDropdown();
  renderFilms(allFilms);
}

function toggleDayDropdown() {
  const dd = document.getElementById('dayDropdown');
  dd.classList.toggle('hidden');
  if (!dd.classList.contains('hidden')) buildDayDropdown();
}

function navDay(delta) {
  const today = new Date(); today.setHours(0,0,0,0);
  const next = addDays(selDate, delta);
  if (next < today) return;
  selDate = next;
  updateDayButton();
  renderFilms(allFilms);
}

document.addEventListener('click', e => {
  const dd = document.getElementById('dayDropdown');
  const wrap = document.querySelector('.day-selector-wrap');
  if (dd && wrap && !wrap.contains(e.target)) dd.classList.add('hidden');
});

function buildPills(films) {
  const today = new Date(); today.setHours(0,0,0,0);
  const hasS  = new Set();
  const visibleFilms = filtreCinema === 'tous' ? films : films.filter(f => f.cinema === filtreCinema);
  visibleFilms.forEach(f => f._sd.forEach(s => hasS.add(dKey(s.date))));

  const dayRow = document.getElementById('dateDayRow');
  const pillsEl = document.getElementById('datePills');
  pillsEl.innerHTML = '';

  if (viewMode === 'semaine') {
    if (dayRow) dayRow.classList.add('hidden');
    pillsEl.classList.remove('hidden');
    const { days } = getWeekBounds(today);
    const visibleDays = days.filter(d => d >= today);
    visibleDays.forEach((d) => {
      const btn = document.createElement('button');
      const isToday = sameDay(d, today);
      const dayLabel = JOURS_SEMAINE[(d.getDay() + 4) % 7];
      btn.className = 'd-pill' + (isToday?' active':'') + (hasS.has(dKey(d))?' has-s':'');
      btn.innerHTML = `<span class="p-day">${dayLabel}</span><span class="p-num">${d.getDate()}</span><span class="p-dot"></span>`;
      btn.dataset.dayKey = dKey(d);
      btn.onclick = () => {
        const target = document.getElementById('day-' + dKey(d));
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        document.querySelectorAll('.d-pill').forEach(p=>p.classList.remove('active'));
        btn.classList.add('active');
      };
      pillsEl.appendChild(btn);
    });
  } else {
    if (dayRow) dayRow.classList.remove('hidden');
    pillsEl.classList.add('hidden');
    updateDayButton();
  }
}

// RENDER HELPERS
// ═══════════════════════════════════════════════════════════
function getRowsForDate(films, displayDate) {
  const today = new Date(); today.setHours(0,0,0,0);
  const isTod = sameDay(displayDate, today);
  let rows = films
    .map(f => {
      if (filtreCinema !== 'tous' && f.cinema !== filtreCinema) return null;
      let sd = f._sd.filter(s => sameDay(s.date, displayDate));
      if (!sd.length) return null;
      sd.sort((a,b) => a.h.localeCompare(b.h));
      return {...f, _day: sd};
    })
    .filter(Boolean);
  if (filtreCinema === 'tous') {
    const merged = {};
    rows.forEach(row => {
      const key = normalizeTitle(row.titre);
      if (!key) return;
      if (!merged[key]) merged[key] = { ...row };
      else {
        const m = merged[key];
        m._day = [...m._day, ...row._day];
        m._day.sort((a,b) => a.h.localeCompare(b.h));
        if (!m._poster && row._poster) m._poster = row._poster;
        if (!m._synopsis && row._synopsis) m._synopsis = row._synopsis;
        if (!m._cast && row._cast) m._cast = row._cast;
        if (!m.note && row.note) m.note = row.note;
      }
    });
    rows = Object.values(merged);
  }
  rows.sort((a,b) => a._day[0].h.localeCompare(b._day[0].h));
  return rows;
}

  if (!rows.length && isTod && !forcedDate) {
    const tomorrow = addDays(today, 1);

    // Mettre à jour la pill "Auj" visuellement
    document.getElementById('ctxDate').textContent =
      today.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});

        <button class="empty-day-btn" onclick="jumpToTomorrow()">

      displayDate.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});

      container.innerHTML = `<div style="padding:56px 20px;text-align:center;color:var(--text-dim);font-size:13px;font-style:italic;font-family:'Playfair Display',serif">Aucune séance programmée ce jour.</div>`;

    document.getElementById('ctxDate').textContent =
      displayDate.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});

    const actors   = actorsTop3(film._cast);
    let slotRows;
    if (filtreCinema === 'tous') {
      // Mode multi-cinémas : grouper par cinéma, version inline sur le bouton
      const byCinema = {};
      film._day.forEach(s => {
        const c = s.cinema || film.cinema || '';
        if (!byCinema[c]) byCinema[c] = [];
        byCinema[c].push(s);
      });
      slotRows = Object.entries(byCinema).map(([cinema, seances]) => {
        const label = SHORT_CINEMA[cinema] || cinema;

          const soon = isTod && isSoon(s.h);

          const aria = 'Réserver ' + s.h + ' ' + cinema + ' — ' + film.titre;
          return '<button type="button" class="card-time-btn ' + cls + '" aria-label="' + escAttr(aria) + '" onclick="event.stopPropagation();openFilm(\'' + esc(film.titre) + '\')">' + s.h + '<span class="slot-ver">' + s.v + '</span></button>';

        }).join('');
        return '<div class="card-slot-row"><div class="card-lang-chip">' + v + '</div>' + btns + '</div>';

    return `<div class="film-card fade" data-t="${escAttr(film.titre)}" onclick="openFilm('${esc(film.titre)}')">
      <div class="card-poster-wrap">
        <img class="card-poster" src="${poster}" alt="Affiche — ${escAttr(film.titre)}" loading="lazy" onerror="this.src='${POSTER_FALLBACK}'" />
      </div>
      <div class="card-body">
        <div class="card-header">
          <div class="card-title">${film.titre}</div>
          <div class="card-meta">${meta}</div>
          ${actors ? `<div class="card-actors">${escHtml(actors)}</div>` : ''}
        </div>
        <div class="card-slots">${slotRows}</div>
      </div>
    </div>`;
  }).join('');

  if (append) {
    container.innerHTML += cardsHtml;
  } else {
    container.innerHTML = cardsHtml;
    container.classList.remove('hidden');
  }
}

function renderCompactList(films, displayDate) {
  const today = new Date(); today.setHours(0,0,0,0);
  const isTod = sameDay(displayDate, today);
  const rows = getRowsForDate(films, displayDate);
  const container = document.getElementById('compactList');

  if (!rows.length) {
    container.innerHTML = `<div style="padding:32px 20px;text-align:center;color:var(--text-dim);font-size:13px;font-style:italic;font-family:'Playfair Display',serif">Aucune séance programmée ce jour.</div>`;
    container.classList.remove('compact-week','hidden');
    return;
  }

  container.classList.remove('compact-week');
  const byCinema = {};
  rows.forEach(f => {
    f._day.forEach(s => {
      const c = s.cinema || f.cinema || '';
      if (!byCinema[c]) byCinema[c] = [];
      byCinema[c].push({ film: f, s });
    });
  });
  const cinemaOrder = ['Le Comoedia','Lumière Terreaux','Lumière Bellecour','Lumière Fourmi'];
  const cinemas = cinemaOrder.filter(c => byCinema[c]).concat(Object.keys(byCinema).filter(c => !cinemaOrder.includes(c)));

  let html = '';
  cinemas.forEach(cinema => {
    const items = byCinema[cinema];
    const byFilm = {};
    items.forEach(({ film, s }) => {
      const key = normalizeTitle(film.titre);
      if (!byFilm[key]) byFilm[key] = { film, times: [] };
      byFilm[key].times.push(s);
    });
    const filmRows = Object.values(byFilm).map(({ film, times }) => {
      times.sort((a,b) => a.h.localeCompare(b.h));
      const timesStr = times.map(s => formatTimeCompact(s.h)).join(' · ');
      return `<div class="compact-row" onclick="openFilm('${esc(film.titre)}')" data-t="${escAttr(film.titre)}" data-poster="${escAttr(film._poster||'')}">
        <div class="compact-title">${escHtml(film.titre.toUpperCase())}</div>
        <div class="compact-poster-slot"></div>
        <div class="compact-times">${escHtml(timesStr)}</div>
      </div>`;
    }).join('');
    html += `<div class="compact-section">
      <div class="compact-section-header">${getCinemaSectionLabel(cinema)}</div>
      ${filmRows}
    </div>`;
  });
  container.innerHTML = html;
  container.classList.remove('hidden');
}

function renderFilmsWeek(films) {
  const today = new Date(); today.setHours(0,0,0,0);
  const { days } = getWeekBounds(today);
  const visibleDays = days.filter(d => d >= today);
  const container = document.getElementById('filmList');
  let html = '';
  visibleDays.forEach(d => {
    const rows = getRowsForDate(films, d);
    const isTod = sameDay(d, today);
    const dayLabel = isTod ? "Aujourd'hui" : d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'short'});
    html += `<div class="week-day-section" id="day-${dKey(d)}">
      <div class="week-day-header${isTod?' today':''}">${dayLabel}</div>`;
    if (!rows.length) {
      html += `<div style="padding:12px 0;color:var(--text-dim);font-size:12px;font-style:italic">Aucune séance.</div>`;
    } else {
      const cardsHtml = rows.map(film => {
        const poster = film._poster || POSTER_FALLBACK;
        const meta = [(film.genres||[])[0], film.realisateur, film.annee, film.duree ? film.duree + 'min' : null].filter(Boolean).join(' · ');
        const actors = actorsTop3(film._cast);
        let slotRows;
        if (filtreCinema === 'tous') {
          const byCinema = {};
          film._day.forEach(s => {
            const c = s.cinema || film.cinema || '';
            if (!byCinema[c]) byCinema[c] = [];
            byCinema[c].push(s);
          });
          slotRows = Object.entries(byCinema).map(([cinema, seances]) => {
            const label = SHORT_CINEMA[cinema] || cinema;
            const btns = seances.map(s => {
              const soon = isTod && isSoon(s.h);
              const past = isTod && isPast(s.h);
              const cls = past ? 'past' : (soon ? 'soon' : '');
              return '<button type="button" class="card-time-btn ' + cls + '" onclick="event.stopPropagation();openFilm(\'' + esc(film.titre) + '\')">' + s.h + '<span class="slot-ver">' + s.v + '</span></button>';
            }).join('');
            return '<div class="card-slot-row"><div class="card-cinema-chip">' + escHtml(label) + '</div>' + btns + '</div>';
          }).join('');
        } else {
          const byVer = {};
          film._day.forEach(s => { if (!byVer[s.v]) byVer[s.v] = []; byVer[s.v].push(s); });
          const verOrder = ['VOSTFR','VF','VO','VFST'];
          slotRows = verOrder.filter(v => byVer[v]).map(v => {
            const btns = byVer[v].map(s => {
              const soon = isTod && isSoon(s.h);
              const past = isTod && isPast(s.h);
              const cls = past ? 'past' : (soon ? 'soon' : '');
              return '<button type="button" class="card-time-btn ' + cls + '" onclick="event.stopPropagation();openFilm(\'' + esc(film.titre) + '\')">' + s.h + '</button>';
            }).join('');
            return '<div class="card-slot-row"><div class="card-lang-chip">' + v + '</div>' + btns + '</div>';
          }).join('');
        }
        return `<div class="film-card fade" data-t="${escAttr(film.titre)}" onclick="openFilm('${esc(film.titre)}')">
          <div class="card-poster-wrap"><img class="card-poster" src="${poster}" alt="" loading="lazy" onerror="this.src='${POSTER_FALLBACK}'" /></div>
          <div class="card-body">
            <div class="card-header"><div class="card-title">${film.titre}</div><div class="card-meta">${meta}</div>${actors ? `<div class="card-actors">${escHtml(actors)}</div>` : ''}</div>
            <div class="card-slots">${slotRows}</div>
          </div>
        </div>`;
      }).join('');
      html += `<div class="week-day-films">${cardsHtml}</div>`;
    }
    html += '</div>';
  });
  container.innerHTML = html;
  container.classList.remove('hidden');
}

function renderCompactWeek(films) {
  const today = new Date(); today.setHours(0,0,0,0);
  const { days } = getWeekBounds(today);
  const visibleDays = days.filter(d => d >= today);
  const container = document.getElementById('compactList');
  const N = visibleDays.length;
  const COLS = `200px repeat(${N}, minmax(110px, 1fr))`;
  const cinemaOrder = ['Le Comoedia','Lumière Terreaux','Lumière Bellecour','Lumière Fourmi'];

  // ── Build data: { cinema → { filmKey → { film, days: { dKey → seances[] } } } } ──
  const cinemaMap = {}; // cinema → Map<filmKey, { film, dayMap }>
  visibleDays.forEach(d => {
    const k = dKey(d);
    const rows = getRowsForDate(films, d);
    rows.forEach(f => {
      const cinema = f.cinema || '';
      if (!cinemaMap[cinema]) cinemaMap[cinema] = new Map();
      const fk = normalizeTitle(f.titre);
      if (!cinemaMap[cinema].has(fk)) cinemaMap[cinema].set(fk, { film: f, dayMap: {} });
      cinemaMap[cinema].get(fk).dayMap[k] = f._day.map(s => ({ h: s.h, v: s.v }));
    });
  });

  const cinemas = cinemaOrder.filter(c => cinemaMap[c])
    .concat(Object.keys(cinemaMap).filter(c => !cinemaOrder.includes(c)));

  if (!cinemas.length) {
    container.innerHTML = `<div style="padding:32px 20px;text-align:center;color:var(--text-dim);font-size:13px;font-style:italic;font-family:'Playfair Display',serif">Aucune séance cette semaine.</div>`;
    container.classList.remove('compact-week','hidden');
    return;
  }

  // ── Day headers ──
  let html = `<div class="cw-grid" style="grid-template-columns:${COLS}">`;
  html += `<div class="cw-corner"></div>`;
  visibleDays.forEach(d => {
    const isTod = sameDay(d, today);
    const label = d.toLocaleDateString('fr-FR', {weekday:'short', day:'2-digit', month:'2-digit'}).toUpperCase();
    html += `<div class="cw-day-head${isTod?' today':''}" id="day-${dKey(d)}">${label}</div>`;
  });

  // ── Cinema groups + film rows ──
  cinemas.forEach(cinema => {
    const filmEntries = [...cinemaMap[cinema].values()];

    // Cinema header row
    html += `<div class="cw-cinema-label">${getCinemaSectionLabel(cinema)}</div>`;
    for (let i = 0; i < N; i++) html += `<div class="cw-cinema-spacer"></div>`;

    // Film rows
    filmEntries.forEach(({ film, dayMap }) => {
      const isTod = true; // used below for past/soon per-day
      html += `<div class="cw-film-label" onclick="openFilm('${esc(film.titre)}')" data-t="${escAttr(film.titre)}" data-poster="${escAttr(film._poster||'')}">${escHtml(film.titre)}</div>`;
      visibleDays.forEach(d => {
        const k = dKey(d);
        const todayDay = sameDay(d, today);
        const seances = dayMap[k] || [];
        if (!seances.length) {
          html += `<div class="cw-times" onclick="openFilm('${esc(film.titre)}')"></div>`;
        } else {
          seances.sort((a,b) => a.h.localeCompare(b.h));
          const lines = seances.map(s => {
            const past = todayDay && isPast(s.h);
            const soon = todayDay && isSoon(s.h);
            const cls = past ? ' t-past' : (soon ? ' t-soon' : '');
            return `<span class="${cls}">${s.h}</span>`;
          }).join('\n');
          html += `<div class="cw-times has-time" onclick="openFilm('${esc(film.titre)}')">${lines}</div>`;
        }
      });
    });
  });

  html += `</div>`;
  container.innerHTML = html;
  container.classList.add('compact-week');
  container.classList.remove('hidden');
}

function renderFilms(films) {
  const filmListEl = document.getElementById('filmList');
  const compactListEl = document.getElementById('compactList');
  filmListEl.classList.add('hidden');
  compactListEl.classList.add('hidden');

  const today = new Date(); today.setHours(0,0,0,0);
  if (viewMode === 'semaine') {
    document.getElementById('ctxDate').textContent =
      'Semaine ' + today.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
    const { days } = getWeekBounds(today);
    const visibleDays = days.filter(d => d >= today);
    const totalSeances = visibleDays.reduce((n, d) => n + getRowsForDate(films, d).reduce((m, f) => m + f._day.length, 0), 0);
    document.getElementById('ctxCount').textContent = totalSeances + ' séance' + (totalSeances > 1 ? 's' : '');
    if (compactView) {
      renderCompactWeek(films);
    } else {
      renderFilmsWeek(films);
    }
  } else {
    if (compactView) {
      document.getElementById('ctxDate').textContent =
        selDate.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
      const rows = getRowsForDate(films, selDate);
      document.getElementById('ctxCount').textContent =
        rows.length ? `${rows.length} film${rows.length>1?'s':''} · ${rows.reduce((n,f)=>n+f._day.length,0)} séances` : '0 séance';
      renderCompactList(films, selDate);
    } else {
      renderFilmsStandard(films, selDate);
    }
  }
}

function jumpToTomorrow() {
  const today = new Date(); today.setHours(0,0,0,0);
  selDate = addDays(today, 1);
  if (viewMode === 'jour') updateDayButton();
  renderFilms(allFilms);
}

function openFilm(titre) {
  let film;
  if (filtreCinema === 'tous') {
    const key = normalizeTitle(titre);
    const matches = allFilms.filter(f => normalizeTitle(f.titre) === key);
    if (!matches.length) return;
    film = { ...matches[0], _sd: matches.flatMap(f => f._sd) };
    for (const m of matches) {
      if (!film._poster   && m._poster)   film._poster   = m._poster;
      if (!film._synopsis && m._synopsis) film._synopsis = m._synopsis;
      if (!film._cast     && m._cast)     film._cast     = m._cast;
      if (!film.note      && m.note)      film.note      = m.note;
      if (!film.genres?.length && m.genres?.length) film.genres = m.genres;
    }
  } else {
    film = allFilms.find(f => f.titre === titre);
  }
  if (!film) return;

  document.querySelectorAll('.film-card, .compact-row').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.film-card, .compact-row').forEach(c => {
    if (c.dataset.t && normalizeTitle(c.dataset.t) === normalizeTitle(titre)) c.classList.add('active');
  });

  renderDetail(film);

  if (window.innerWidth <= 820) {
    const side = document.getElementById('sidePanel');
    side.classList.add('open');
    document.querySelector('.m-back')?.remove();
    const back = document.createElement('div');
    back.className = 'm-back';
    back.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>&nbsp;Retour`;
    back.onclick = () => { side.classList.remove('open'); back.remove(); };
    side.prepend(back);
    side.scrollTo(0,0); window.scrollTo(0,0);
  }
}

function renderDetail(film) {
  const poster = film._poster || null;
  const note   = film.note ? film.note.toFixed(1) : null;
  const cast   = film._cast    || '';
  const synop  = film._synopsis || film.synopsis;
  const today  = new Date(); today.setHours(0,0,0,0);

  // Grouper par jour puis par cinéma (si plusieurs cinémas)
  const byDay = {};
  film._sd.forEach(s => {
    const k = dKey(s.date);
    if (!byDay[k]) byDay[k] = {date:s.date, seances:[]};
    byDay[k].seances.push(s);
  });
  const cinemas = [...new Set(film._sd.map(s => s.cinema).filter(Boolean))];
  const multiCinema = cinemas.length > 1;
  const weekHtml = Object.values(byDay)
    .sort((a,b) => a.date-b.date)
    .map(({date,seances}) => {
      const isTod = sameDay(date,today);
      const lbl = isTod ? "Aujourd'hui" : date.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'short'});
      let content;
      if (multiCinema) {
        const byCinema = {};
        seances.forEach(s => {
          const c = s.cinema || 'Le Comoedia';
          if (!byCinema[c]) byCinema[c] = [];
          byCinema[c].push(s);
        });
        content = Object.entries(byCinema)
          .sort(([a],[b]) => (SHORT_CINEMA[a]||a).localeCompare(SHORT_CINEMA[b]||b))
          .map(([cinema, sess]) => {
            const short = SHORT_CINEMA[cinema] || cinema;
            const chips = sess.sort((a,b)=>a.h.localeCompare(b.h)).map(s => {
              const past=isTod&&isPast(s.h), soon=isTod&&isSoon(s.h);
              return `<span class="d-chip${past?' past':''}${soon?' soon':''}">${s.h}<span class="cv">${s.v}</span></span>`;
            }).join('');
            return `<div class="d-day-row"><span class="d-cine-tag">${short}</span><span class="d-chips">${chips}</span></div>`;
          }).join('');
      } else {
        const chips = seances.sort((a,b)=>a.h.localeCompare(b.h)).map(s => {
          const past=isTod&&isPast(s.h), soon=isTod&&isSoon(s.h);
          return `<div class="d-chip${past?' past':''}${soon?' soon':''}">${s.h}<span class="cv">${s.v}</span></div>`;
        }).join('');
        content = `<div class="d-chips">${chips}</div>`;
      }
      return `<div class="d-day"><div class="d-day-lbl">${lbl}</div>${content}</div>`;
    }).join('');

  document.getElementById('detailEmpty').classList.add('hidden');
  const el = document.getElementById('detailContent');
  el.classList.remove('hidden');
  el.innerHTML = `
    <div class="d-hero fade">
      ${poster
        ? `<img class="d-back" src="${poster}" alt="" style="filter:brightness(.35) saturate(.6) blur(4px);transform:scale(1.05);" />`
        : `<div class="d-back-ph" style="background:${film.color}"></div>`}
      ${note ? `<div class="d-score"><span class="d-score-num">${note}</span><span class="d-score-lbl">IMDb</span></div>` : ''}
    </div>
    <div class="d-body fade">
      <div class="d-title">${film.titre}</div>
      ${film.titreOriginal !== film.titre ? `<div class="d-orig">${film.titreOriginal}</div>` : ''}
      <div class="d-crew">
        <div class="d-ci"><span class="lbl">Réalisation</span><span class="val">${film.realisateur}</span></div>
        <div class="d-ci"><span class="lbl">Année</span><span class="val">${film.annee}</span></div>
        <div class="d-ci"><span class="lbl">Durée</span><span class="val">${film.duree} min</span></div>
        ${cast ? `<div class="d-ci"><span class="lbl">Avec</span><span class="val">${cast}</span></div>` : ''}
      </div>
      <div class="d-genres">${(film.genres||[]).map(g=>`<span class="d-genre">${g}</span>`).join('')}</div>
      <p class="d-synopsis">${synop}</p>
      <div class="d-week-lbl">Séances de la semaine</div>
      ${weekHtml}
    </div>`;
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
async function boot() {
  updateHeaderSubtitle();
  renderEvents();
  buildCinemaBar();
  try {
    allFilms = ensureFilms(await loadAll());
  } catch(e) {
    console.error('[CinémasLyon] Erreur loadAll:', e);

  }
  document.getElementById('skeletons').remove();
  document.getElementById('btnViewJour').classList.add('active');

<div id="compactPosterTooltip">
  <div class="poster-layer" id="compactPosterA"><img src="" alt="" /></div>
  <div class="poster-layer" id="compactPosterB"><img src="" alt="" /></div>
</div>

<script>
// ── Compact list poster tooltip ──
(function() {
  const tooltip = document.getElementById('compactPosterTooltip');
  const layerA  = document.getElementById('compactPosterA');
  const layerB  = document.getElementById('compactPosterB');
  const imgA    = layerA.querySelector('img');
  const imgB    = layerB.querySelector('img');
  const FALLBACK = typeof POSTER_FALLBACK !== 'undefined' ? POSTER_FALLBACK : '';
  let hideTimer = null;
  let activeLayer = 'A';
  let lastSrc = '';
  let lastRowY = null;

  function show(row, poster) {
    clearTimeout(hideTimer);
    const src = poster || FALLBACK;

    // Position: align with the poster slot (middle column)
    const slot = row.querySelector('.compact-poster-slot');
    const rect = slot ? slot.getBoundingClientRect() : row.getBoundingClientRect();
    const TW = 110, TH = 165;
    let x = (slot ? rect.left + (rect.width - TW) / 2 : rect.left + rect.width * 0.5 - TW / 2) - 100;
    let y = rect.top + rect.height / 2 - TH / 2;
    x = Math.max(8, Math.min(window.innerWidth - TW - 8, x));
    y = Math.max(8, Math.min(window.innerHeight - TH - 8, y));

    tooltip.style.left = x + 'px';
    tooltip.style.top  = y + 'px';
    tooltip.classList.add('visible');

    // Crossfade when switching posters
    const rowCenterY = rect.top + rect.height / 2;
    if (src && src !== lastSrc) {
      lastSrc = src;
      const outLayer = activeLayer === 'A' ? layerA : layerB;
      const inLayer  = activeLayer === 'A' ? layerB : layerA;
      const inImg    = activeLayer === 'A' ? imgB : imgA;
      outLayer.classList.remove('active','from-top','from-bottom');
      inLayer.classList.remove('from-top','from-bottom');
      if (lastRowY !== null) {
        inLayer.classList.add(rowCenterY > lastRowY ? 'from-top' : 'from-bottom');
      }
      lastRowY = rowCenterY;
      inImg.src = src;
      inImg.onerror = () => { inImg.src = FALLBACK; };
      inLayer.classList.add('active');
      activeLayer = activeLayer === 'A' ? 'B' : 'A';
    } else if (lastRowY === null) {
      lastRowY = rowCenterY;
    }
  }

  function hide() {
    hideTimer = setTimeout(() => {
      tooltip.classList.remove('visible');
      lastRowY = null;
    }, 60);
  }

  document.addEventListener('mouseover', function(e) {
    const row = e.target.closest('.compact-row');
    if (row) show(row, row.dataset.poster);
  });
  document.addEventListener('mouseout', function(e) {
    const row = e.target.closest('.compact-row');
    if (row) hide();
  });
})();
</script>
