<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinémas Lyon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#111010; --bg2:#191817; --bg3:#201f1d; --bg4:#272523;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.13);
  --gold:#c9a84c; --gold-dim:#7a6430;
  --text:#f0ebe0; --text-dim:#7a7060; --text-mid:#a09080;
  --accent:#e8603a; --green:#4fa06a;
  --r:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
header{
  padding:0 28px;display:flex;align-items:center;justify-content:space-between;
  height:58px;position:sticky;top:0;z-index:200;
  background:rgba(17,16,16,.96);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.logo{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:var(--text);text-decoration:none;}
.logo em{font-style:italic;color:var(--text-mid);font-weight:400;}
.header-right{display:flex;align-items:center;gap:18px;}
.h-loc{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);}
.live{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:1fr 440px;max-width:1260px;margin:0 auto;min-height:calc(100vh - 58px);}
.main{border-right:1px solid var(--border);}
.side{background:var(--bg);}

/* ── TABS ── */
.tabs{display:flex;padding:0 28px;border-bottom:1px solid var(--border);}
.tab{padding:18px 0;margin-right:28px;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);cursor:pointer;background:none;border:none;border-bottom:1.5px solid transparent;position:relative;top:1px;font-family:'DM Sans',sans-serif;transition:color .2s,border-color .2s;}
.tab.active{color:var(--text);border-bottom-color:var(--gold);}
.tab:hover:not(.active){color:var(--text-mid);}

/* ── DATE BAR ── */
.date-bar{padding:14px 28px 12px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:58px;z-index:100;}
.date-pills{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;}
.date-pills::-webkit-scrollbar{display:none;}
.d-pill{
  flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:7px 16px;border-radius:100px;
  border:1px solid var(--border);background:transparent;
  cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text-dim);
  transition:all .18s;white-space:nowrap;
}
.d-pill:hover{border-color:var(--border2);color:var(--text);}
.d-pill.active{background:var(--text);border-color:var(--text);color:#111;}
.p-day{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;}
.p-num{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;line-height:1;}
.p-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0;flex-shrink:0;}
.d-pill.has-s .p-dot{opacity:1;}
.d-pill.active .p-dot{background:rgba(0,0,0,.35);}

/* ── CINEMA BAR ── */
.cinema-bar{
  padding:10px 28px;background:var(--bg2);border-bottom:1px solid var(--border);
  position:sticky;top:123px;z-index:99;
}
.cinema-pills{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;white-space:nowrap;}
.cinema-pills::-webkit-scrollbar{display:none;}
.c-pill{
  flex-shrink:0;padding:5px 14px;border-radius:100px;
  border:1px solid var(--border);background:transparent;
  cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;
  letter-spacing:.07em;text-transform:uppercase;color:var(--text-dim);
  transition:all .18s;
}
.c-pill:hover{border-color:var(--border2);color:var(--text);}
.c-pill.active{background:var(--gold);border-color:var(--gold);color:#111;font-weight:500;}

/* ── CTX BAR ── */
.ctx{padding:9px 28px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text-dim);border-bottom:1px solid var(--border);}
.ctx-date{color:var(--text-mid);font-size:12px;}
.ctx a{color:var(--gold-dim);text-decoration:none;}
.ctx a:hover{color:var(--gold);}

/* ── CINEMA CHIP (slot row label in "Tous" mode) ── */
.card-cinema-chip{
  flex-shrink:0;min-width:82px;height:56px;
  display:flex;align-items:center;justify-content:center;
  border-radius:12px;border:1px solid #3a3a3a;
  background:rgba(255,255,255,.04);color:var(--text-mid);
  font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;
  padding:0 12px;
}
/* tiny version label inside time button */
.slot-ver{font-size:10px;opacity:.45;margin-left:5px;letter-spacing:.05em;font-family:'DM Sans',sans-serif;}

/* ── FILM CARDS (design maquette) ── */
.film-list{padding:16px 20px 40px;display:flex;flex-direction:column;gap:16px;}

.film-card{
  border-radius:12px;overflow:visible;cursor:pointer;
  background:#0b0b0b;border:1px solid #3a3a3a;
  transition:transform .2s ease,box-shadow .2s ease,border-color .2s;
  display:flex;gap:24px;padding:20px;align-items:flex-start;
}
.film-card:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.6);border-color:#4a4a4a;}
.film-card.active{border-color:rgba(201,168,76,.5);box-shadow:0 0 0 1px rgba(201,168,76,.2);}

/* poster — 160×240, ratio 2:3 */
.card-poster-wrap{flex-shrink:0;}
.card-poster{
  width:160px;height:240px;border-radius:10px;
  object-fit:cover;display:block;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  background:#111;
}

/* card body */
.card-body{flex:1;min-width:0;padding-top:0px;padding-bottom:0px;}
.card-header{margin-bottom:8px;}
.card-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,40px);font-weight:300;color:#fff;line-height:1.15;}
.card-meta{font-size:16px;color:#dcdcdc;margin-top:8px;line-height:1.5;}
.card-actors{font-size:13px;color:var(--text-dim);margin-top:4px;line-height:1.4;}

/* grid langue + créneaux — une ligne par version */
.card-slots{display:flex;flex-direction:column;gap:12px;margin-top:16px;}
.card-slot-row{display:flex;flex-wrap:wrap;align-items:center;gap:12px;}
/* chip langue — bordure dashed */
.card-lang-chip{
  flex-shrink:0;min-width:100px;height:56px;
  display:flex;align-items:center;justify-content:center;
  border-radius:12px;border:2px dashed #4a4a4a;
  background:transparent;color:#fff;font-size:18px;font-weight:500;
  padding:0 18px;
}
/* bouton créneau */
.card-time-btn{
  font-family:'DM Mono',monospace;font-size:18px;font-weight:400;
  height:56px;min-width:100px;padding:0 24px;
  border-radius:14px;border:1px solid #3a3a3a;
  background:#2b2b2b;color:#fff;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.card-time-btn:hover{background:#333;border-color:#4a4a4a;}
.card-time-btn.past{color:#666;opacity:.5;cursor:default;}
.card-time-btn.soon{border-color:var(--accent);color:var(--accent);background:rgba(232,96,58,.1);}

/* skeleton */
.sk-card{border-radius:12px;border:1px solid #3a3a3a;background:#0b0b0b;display:flex;gap:24px;padding:20px;}
.sk-poster{width:160px;height:240px;border-radius:10px;background:#111;animation:sh 1.6s ease-in-out infinite;flex-shrink:0;}
.sk-foot{display:flex;flex-direction:column;gap:8px;flex:1;}
.sk-line{border-radius:3px;background:#1a1a1a;animation:sh 1.6s ease-in-out infinite;}
@keyframes sh{0%,100%{opacity:.4}50%{opacity:.75}}

/* empty-day message */
.empty-day{
  margin:24px 20px;padding:28px 24px;
  border-radius:var(--r);border:1px solid var(--border);
  background:var(--bg2);text-align:center;
}
.empty-day-icon{font-size:28px;margin-bottom:12px;}
.empty-day-title{font-family:'Playfair Display',serif;font-size:17px;font-style:italic;color:var(--text-mid);margin-bottom:6px;}
.empty-day-sub{font-size:12px;color:var(--text-dim);line-height:1.7;margin-bottom:18px;}
.empty-day-btn{
  display:inline-flex;align-items:center;gap:8px;
  font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  padding:9px 18px;border-radius:100px;
  background:var(--text);color:#111;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:opacity .2s;
}

/* ── DETAIL PANEL ── */
.detail-wrap{position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px;}

.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--text-dim);font-size:13px;text-align:center;padding:40px;}
.detail-empty svg{opacity:.1;margin-bottom:4px;}
.detail-empty strong{font-family:'Playfair Display',serif;font-size:17px;color:var(--text-mid);font-weight:400;font-style:italic;}

.d-hero{position:sticky;top:0;height:calc(100vh - 58px);overflow:hidden;z-index:0;flex-shrink:0;}
.d-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(17,16,16,.15) 0%,rgba(17,16,16,.65) 55%,var(--bg) 100%);z-index:1;pointer-events:none;}
.d-back{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.3) saturate(.5) blur(20px);transform:scale(1.1);}
.d-back-ph{height:100%;background:linear-gradient(135deg,var(--bg3),var(--bg));}
.d-score{position:absolute;top:14px;right:14px;z-index:2;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:9px 14px;text-align:center;backdrop-filter:blur(8px);}
.d-score-num{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--gold);line-height:1;display:block;}
.d-score-lbl{font-size:10px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;}

.d-body{position:relative;z-index:1;margin-top:calc(160px - (100vh - 58px));padding:28px 28px 40px;}
.d-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1.15;margin-bottom:4px;}
.d-orig{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;color:var(--text-dim);margin-bottom:18px;}
.d-crew{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:20px;}
.d-ci .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:3px;}
.d-ci .val{font-size:16px;color:var(--text);}
.d-genres{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.d-genre{font-size:12px;padding:4px 12px;border-radius:100px;border:1px solid var(--border);color:var(--text-dim);letter-spacing:.05em;}
.d-synopsis{font-size:15px;line-height:1.8;color:var(--text-mid);margin-bottom:28px;}
.d-week-lbl{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;}
.d-day{margin-bottom:20px;}
.d-day-lbl{font-size:13px;color:var(--text-dim);margin-bottom:8px;}
.d-chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.d-chip{font-family:'DM Mono',monospace;font-size:14px;padding:7px 14px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;gap:7px;}
.d-chip.past{color:var(--text-dim);opacity:.45;}
.d-chip.soon{border-color:var(--accent);color:var(--accent);}
.d-chip .cv{font-size:11px;opacity:.5;letter-spacing:.06em;}
.d-day-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;}
.d-day-row:last-child{margin-bottom:0;}
.d-cine-tag{flex-shrink:0;min-width:72px;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--text-dim);}

/* ── EVENTS ── */
.events-list{padding:16px 20px 40px;display:flex;flex-direction:column;gap:10px;}
.ev{border-radius:var(--r);border:1px solid var(--border);background:var(--bg2);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s;display:grid;grid-template-columns:70px 1fr;}
.ev:hover{border-color:var(--border2);transform:translateY(-1px);}
.ev-date{display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.025);border-right:1px solid var(--border);padding:16px 0;}
.ev-n{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--gold);line-height:1;}
.ev-m{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);}
.ev-info{padding:14px 16px;}
.ev-type{font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.ev-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;line-height:1.3;margin-bottom:6px;}
.ev-desc{font-size:12px;color:var(--text-dim);line-height:1.6;margin-bottom:8px;}
.ev-meta{font-size:11px;color:var(--text-dim);display:flex;gap:12px;}

/* ── MOBILE ── */
.m-tabs{display:none;padding:0 20px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:58px;z-index:150;}
.m-back{display:none;align-items:center;gap:8px;padding:12px 20px;font-size:11px;color:var(--text-mid);cursor:pointer;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:58px;z-index:140;letter-spacing:.08em;text-transform:uppercase;}

@media(max-width:820px){
  .app{display:block;}
  .main{border-right:none;}
  .side{display:none;}
  .side.open{display:block;position:fixed;inset:58px 0 0 0;overflow-y:auto;background:var(--bg);z-index:130;}
  .tabs{display:none;}
  .m-tabs{display:flex;}
  .m-back{display:flex;}
  .detail-wrap{position:static;height:auto;}
  .date-bar{top:100px;}
  .cinema-bar{top:auto;position:relative;padding:8px 12px;}
  header{padding:0 16px;}
  .h-loc{display:none;}
  .film-list,.events-list{padding:12px 12px 32px;}
  .ctx{padding:8px 16px;}
  /* Cards responsive: empiler affiche au-dessus du contenu */
  .film-card{flex-direction:column;align-items:center;padding:16px;}
  .card-poster{width:140px;height:210px;}
  .card-title{font-size:24px;text-align:center;}
  .card-meta{text-align:center;}
  .card-slots{width:100%;}
  .card-slot-row{flex-wrap:wrap;}
  .card-lang-chip{min-width:80px;height:48px;font-size:14px;}
  .card-time-btn{min-width:80px;height:48px;font-size:16px;}
  .d-hero{position:relative;height:200px;}
  .d-body{margin-top:0;}
}

.hidden{display:none!important;}
.fade{animation:fadeUp .28s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<header>
  <a href="#" class="logo">Cinémas <em>Lyon</em></a>
  <div class="header-right">
    <span class="h-loc">Comoedia · Lumière</span>
    <span class="live"><span class="live-dot"></span>Cette semaine</span>
  </div>
</header>

<div class="m-tabs" id="mTabs">
  <button class="tab active" onclick="mTab('seances',this)">Séances</button>
  <button class="tab" onclick="mTab('events',this)">Événements</button>
</div>

<div class="app">
  <div class="main">
    <div class="tabs">
      <button class="tab active" id="tabS" onclick="swTab('seances')">Séances</button>
      <button class="tab"        id="tabE" onclick="swTab('events')">Événements</button>
    </div>

    <div id="secSeances">
      <div class="date-bar"><div class="date-pills" id="datePills"></div></div>
      <div class="cinema-bar"><div class="cinema-pills" id="cinemaBar"></div></div>
      <div class="ctx">
        <span class="ctx-date" id="ctxDate">—</span>
        <span id="ctxCount" style="font-size:11px;color:var(--text-dim)">—</span>
      </div>

      <!-- Skeletons -->
      <div class="film-list" id="skeletons">
        <div class="sk-card"><div class="sk-poster"></div><div class="sk-foot"><div class="sk-line" style="height:12px;width:45%"></div><div class="sk-line" style="height:17px;width:70%"></div><div style="display:flex;gap:6px;margin-top:2px"><div class="sk-line" style="height:26px;width:62px"></div><div class="sk-line" style="height:26px;width:62px"></div><div class="sk-line" style="height:26px;width:62px"></div></div></div></div>
        <div class="sk-card"><div class="sk-poster"></div><div class="sk-foot"><div class="sk-line" style="height:12px;width:40%"></div><div class="sk-line" style="height:17px;width:60%"></div><div style="display:flex;gap:6px;margin-top:2px"><div class="sk-line" style="height:26px;width:62px"></div><div class="sk-line" style="height:26px;width:62px"></div></div></div></div>
        <div class="sk-card"><div class="sk-poster"></div><div class="sk-foot"><div class="sk-line" style="height:12px;width:50%"></div><div class="sk-line" style="height:17px;width:75%"></div><div style="display:flex;gap:6px;margin-top:2px"><div class="sk-line" style="height:26px;width:62px"></div><div class="sk-line" style="height:26px;width:62px"></div><div class="sk-line" style="height:26px;width:62px"></div></div></div></div>
      </div>

      <div class="film-list hidden" id="filmList"></div>
    </div>

    <div id="secEvents" class="hidden">
      <div class="events-list" id="eventsList"></div>
    </div>
  </div>

  <div class="side" id="sidePanel">
    <div class="detail-wrap">
      <div class="detail-empty" id="detailEmpty">
        <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
          <rect x="11" y="7" width="38" height="46" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M20 20h20M20 28h20M20 36h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <strong>Sélectionnez un film</strong>
        <span style="font-size:12px;color:var(--text-dim);line-height:1.7">Synopsis, casting et toutes<br>les séances de la semaine</span>
      </div>
      <div id="detailContent" class="hidden"></div>
    </div>
  </div>
</div>

<script>

// CONFIG
// Clé OMDb gratuite : https://www.omdbapi.com/apikey.aspx
// La clé demo ci-dessous est limitée à 1000 req/jour
// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════

  },
  {

    annee:2023, realisateur:"Christopher Nolan", duree:180, genres:["Biopic","Thriller"],

  },

const JOURS    = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const addDays  = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const sameDay  = (a,b) => a.toDateString()===b.toDateString();
const dKey     = d => d.toISOString().slice(0,10);
const now      = () => new Date();
const parseH   = h => { const [hh,mm]=h.split(':').map(Number),d=new Date(); d.setHours(hh,mm,0,0); return d; };
const isPast   = h => parseH(h) < now();
const isSoon   = h => { const dt=(parseH(h)-now())/60000; return dt>=0&&dt<=60; };
const esc      = s => s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
const escAttr  = s => s.replace(/"/g,'&quot;').replace(/\\/g,'\\\\');
const escHtml  = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
// Clé normalisée pour déduplication (même film à Comoedia/Lumière avec variantes de casse)
const normalizeTitle = t => (t||'').toLowerCase().trim().replace(/\s+/g,' ');

// ═══════════════════════════════════════════════════════════
// TMDB (source principale) + OMDb (fallback)
// ═══════════════════════════════════════════════════════════
let tmdbCache = {};      // imdbId -> { overview, poster, note, cast }
let tmdbByTitleCache = {}; // "titre|annee" -> { overview, poster, note, cast, imdbId }
let omdbCache = {};
let omdbByTitleCache = {};

async function fetchTMDBByImdbId(imdbId) {
  if (!TMDB_KEY || tmdbCache[imdbId] !== undefined) return tmdbCache[imdbId];
  try {
    const r1 = await fetch(`https://api.themoviedb.org/3/find/${imdbId}?api_key=${TMDB_KEY}&external_source=imdb_id`);
    if (!r1.ok) return tmdbCache[imdbId] = null;
    const d1 = await r1.json();
    const movie = (d1.movie_results || [])[0];
    if (!movie || !movie.id) return tmdbCache[imdbId] = null;
    let cast = null;
    const r2 = await fetch(`https://api.themoviedb.org/3/movie/${movie.id}/credits?api_key=${TMDB_KEY}`);
    if (r2.ok) {
      const d2 = await r2.json();
      const names = (d2.cast || []).slice(0, 3).map(c => c.name).filter(Boolean);
      cast = names.length ? names.join(', ') : null;
    }
    return tmdbCache[imdbId] = {
      overview: movie.overview || null,
      poster: movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : null,
      note: movie.vote_average != null ? movie.vote_average : null,
      cast,
    };
  } catch { return tmdbCache[imdbId] = null; }
}

async function fetchTMDBByTitle(titre, annee) {
  if (!TMDB_KEY) return null;
  const key = `${titre}|${annee || ''}`;
  if (tmdbByTitleCache[key] !== undefined) return tmdbByTitleCache[key];
  try {
    let url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(titre)}`;
    if (annee) url += `&year=${annee}`;
    const r1 = await fetch(url);
    if (!r1.ok) return tmdbByTitleCache[key] = null;
    const d1 = await r1.json();
    const movie = (d1.results || [])[0];
    if (!movie || !movie.id) return tmdbByTitleCache[key] = null;
    let cast = null;
    const r2 = await fetch(`https://api.themoviedb.org/3/movie/${movie.id}/credits?api_key=${TMDB_KEY}`);
    if (r2.ok) {
      const d2 = await r2.json();
      const names = (d2.cast || []).slice(0, 3).map(c => c.name).filter(Boolean);
      cast = names.length ? names.join(', ') : null;
    }
    const r3 = await fetch(`https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB_KEY}`);
    let imdbId = null;
    if (r3.ok) {
      const d3 = await r3.json();
      imdbId = d3.imdb_id || null;
    }
    return tmdbByTitleCache[key] = {
      overview: movie.overview || null,
      poster: movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : null,
      note: movie.vote_average != null ? movie.vote_average : null,
      cast,
      imdbId,
    };
  } catch { return tmdbByTitleCache[key] = null; }
}

async function fetchOMDb(imdbId) {
  if (imdbId in omdbCache) return omdbCache[imdbId];
  try {
    const url = `https://www.omdbapi.com/?i=${imdbId}&apikey=${OMDB_KEY}&plot=full`;
    const r = await fetch(url);
    if (!r.ok) return omdbCache[imdbId] = null;
    const d = await r.json();
    if (d.Response === 'False') return omdbCache[imdbId] = null;
    return omdbCache[imdbId] = d;
  } catch { return omdbCache[imdbId] = null; }
}

async function fetchOMDbByTitle(titre, annee) {
  const key = `${titre}|${annee || ''}`;
  if (key in omdbByTitleCache) return omdbByTitleCache[key];
  try {
    let url = `https://www.omdbapi.com/?t=${encodeURIComponent(titre)}&apikey=${OMDB_KEY}&type=movie`;
    if (annee) url += `&y=${annee}`;
    const r = await fetch(url);
    if (!r.ok) return omdbByTitleCache[key] = null;
    const d = await r.json();
    // If not found with year, retry without year
    if (d.Response === 'False' && annee) {
      const r2 = await fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(titre)}&apikey=${OMDB_KEY}&type=movie`);
      if (r2.ok) {
        const d2 = await r2.json();
        if (d2.Response === 'True') return omdbByTitleCache[key] = d2;
      }
    }
    if (d.Response === 'False') return omdbByTitleCache[key] = null;
    return omdbByTitleCache[key] = d;
  } catch { return omdbByTitleCache[key] = null; }
}

async function enrichFilm(f) {
  const titreOrig = f.titreOriginal || null;
  const titreFr   = f.titre;
  let t = null, o = null;

  // 1. TMDB en priorité (si clé configurée)
  if (TMDB_KEY) {
    if (f.imdbId) t = await fetchTMDBByImdbId(f.imdbId);
    if (!t) t = await fetchTMDBByTitle(titreOrig || titreFr, f.annee);
    // Si pas de résultat avec le titre original, essayer le titre français
    if (!t && titreOrig && titreOrig !== titreFr) t = await fetchTMDBByTitle(titreFr, f.annee);
    if (t) {
      if (t.imdbId && !f.imdbId) f.imdbId = t.imdbId;
      if (!f._poster   && t.poster)           f._poster   = t.poster;
      if (!f.note      && t.note != null)      f.note      = t.note;
      if (!f._cast     && t.cast)              f._cast     = t.cast;
      if (!f._synopsis && t.overview)          f._synopsis = t.overview;
    }
  }

  // 2. OMDb en fallback pour les champs encore manquants (dont affiche)
  const needsMore = !f._cast || !f._synopsis || !f._poster;
  if (needsMore) {
    if (f.imdbId) o = await fetchOMDb(f.imdbId);
    // Essai par titre original puis français si pas d'imdbId ou OMDb vide
    if (!o && titreOrig) o = await fetchOMDbByTitle(titreOrig, f.annee);
    if (!o && titreFr !== titreOrig) o = await fetchOMDbByTitle(titreFr, f.annee);
    if (o) {
      if (!f.imdbId && o.imdbID)                                         f.imdbId    = o.imdbID;
      if (!f._poster   && o.Poster   && o.Poster   !== 'N/A')            f._poster   = o.Poster;
      if (!f.note      && o.imdbRating && o.imdbRating !== 'N/A')        f.note      = parseFloat(o.imdbRating);
      if (!f._cast     && o.Actors   && o.Actors   !== 'N/A')            f._cast     = o.Actors;
      if (!f._synopsis && o.Plot     && o.Plot     !== 'N/A')            f._synopsis = o.Plot;
    }
  }
}

function actorsTop3(castStr) {
  if (!castStr || typeof castStr !== 'string') return null;
  const list = castStr.split(',').map(s => s.trim()).filter(Boolean);
  return list.slice(0, 3).join(', ') || null;
}

// LOAD ALL
// Tente d'abord de charger programme.json (généré par scraper.py)
// Fallback sur FILMS_DATA + enrichissement TMDB/OMDb si pas de fichier
// ═══════════════════════════════════════════════════════════
async function loadAll() {
  const today = new Date(); today.setHours(0,0,0,0);

  // ── Essai 1 : fichier JSON généré par le scraper ──
  try {
    const res = await fetch('./programme.json');
    if (res.ok) {
      const data = await res.json();
      let films = data.films.map(f => ({
        ...f,
        note:    f.imdbRating || f.note || null,
        _poster: f.poster     || null,
        _cast:   f.cast       || null,
        _synopsis: f.synopsis || null,
        color:   '#1a1a1a',
        cinema:  f.cinema     || 'Le Comoedia',
        _sd: f.seances.map(s => ({
          h: s.heure,
          v: s.version,
          date: new Date(s.date + 'T00:00:00'),
          resa_url: s.resa_url || null,
          cinema: f.cinema || 'Le Comoedia',
        })),
      }));
      await Promise.all(films.map(enrichFilm));
      console.info(`[CinémasLyon] programme.json chargé — ${films.length} films (généré le ${data.generated_at?.slice(0,16)})`);
      return films;
    }
  } catch (_) { /* pas de fichier JSON, on continue */ }

  // ── Essai 2 : données locales + enrichissement OMDb ──
  console.info('[CinémasLyon] programme.json absent — utilisation des données de démonstration + TMDB/OMDb');
  const films = FILMS_DATA.map(f => ({
    ...f,
    cinema: f.cinema || 'Le Comoedia',
    _sd: f.seances.map(s => ({ ...s, date: addDays(today, s.j) })),
  }));

  await Promise.all(films.map(enrichFilm));

  return films;
}

// DATE PILLS
// ═══════════════════════════════════════════════════════════
function buildPills(films) {
  const today = new Date(); today.setHours(0,0,0,0);
  const hasS  = new Set();
  const visibleFilms = filtreCinema === 'tous' ? films : films.filter(f => f.cinema === filtreCinema);
  visibleFilms.forEach(f => f._sd.forEach(s => hasS.add(dKey(s.date))));

  const el = document.getElementById('datePills');
  el.innerHTML = '';
  for (let i=0; i<7; i++) {
    const d   = addDays(today, i);
    const btn = document.createElement('button');
    btn.className = 'd-pill' + (i===0?' active':'') + (hasS.has(dKey(d))?' has-s':'');
    btn.innerHTML = `<span class="p-day">${i===0?'Auj':JOURS[d.getDay()]}</span><span class="p-num">${d.getDate()}</span><span class="p-dot"></span>`;
    btn.onclick = () => {
      document.querySelectorAll('.d-pill').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      selDate = d;
      renderFilms(allFilms);
    };
    el.appendChild(btn);
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER FILM CARDS
// ═══════════════════════════════════════════════════════════
function renderFilms(films, forcedDate) {
  const displayDate = forcedDate || selDate;
  const today = new Date(); today.setHours(0,0,0,0);
  const isTod = sameDay(displayDate, today);

  // Pour aujourd'hui, on filtre les séances déjà passées
  let rows = films
    .map(f => {
      if (filtreCinema !== 'tous' && f.cinema !== filtreCinema) return null;
      let sd = f._sd.filter(s => sameDay(s.date, displayDate));
      if (!sd.length) return null;
      if (isTod) sd = sd.filter(s => !isPast(s.h));
      if (!sd.length) return null;
      sd.sort((a,b) => a.h.localeCompare(b.h));
      return {...f, _day: sd};
    })
    .filter(Boolean);

  // En mode "Tous" : dédupliquer les films par titre normalisé (casse insensible)
  // ex. "Le son des souvenirs" et "Le Son des souvenirs" → une seule entrée
  if (filtreCinema === 'tous') {
    const merged = {};
    rows.forEach(row => {
      const key = normalizeTitle(row.titre);
      if (!key) return;
      if (!merged[key]) {
        merged[key] = { ...row };
      } else {
        const m = merged[key];
        m._day = [...m._day, ...row._day];
        m._day.sort((a,b) => a.h.localeCompare(b.h));
        // Prendre la meilleure valeur disponible parmi toutes les copies
        if (!m._poster   && row._poster)   m._poster   = row._poster;
        if (!m._synopsis && row._synopsis) m._synopsis = row._synopsis;
        if (!m._cast     && row._cast)     m._cast     = row._cast;
        if (!m.note      && row.note)      m.note      = row.note;
      }
    });
    rows = Object.values(merged);
  }

  rows.sort((a,b) => a._day[0].h.localeCompare(b._day[0].h));

  const container = document.getElementById('filmList');

  // Si aujourd'hui + aucune séance restante → message + afficher demain
  if (!rows.length && isTod && !forcedDate) {
    const tomorrow = addDays(today, 1);
    const tomorrowLabel = tomorrow.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});

    // Mettre à jour la pill "Auj" visuellement
    document.getElementById('ctxDate').textContent =
      today.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
    document.getElementById('ctxCount').textContent = '0 séance';

    container.innerHTML = `
      <div class="empty-day">
        <div class="empty-day-icon">🎬</div>
        <div class="empty-day-title">Plus de séances aujourd'hui</div>
        <div class="empty-day-sub">Toutes les projections du jour sont terminées.<br>Voici le programme de demain.</div>
        <button class="empty-day-btn" onclick="jumpToTomorrow()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v6l4 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.5"/></svg>
          ${tomorrowLabel}
        </button>
      </div>`;

    // Afficher les films de demain en dessous
    renderFilms(films, tomorrow);
    container.classList.remove('hidden');
    return;
  }

  // Cas "pas de séances ce jour" (pas aujourd'hui)
  if (!rows.length) {
    document.getElementById('ctxDate').textContent =
      displayDate.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
    document.getElementById('ctxCount').textContent = '0 séance';
    if (!forcedDate) {
      container.innerHTML = `<div style="padding:56px 20px;text-align:center;color:var(--text-dim);font-size:13px;font-style:italic;font-family:'Playfair Display',serif">Aucune séance programmée ce jour.</div>`;
      container.classList.remove('hidden');
    }
    return;
  }

  // Mise à jour du ctx bar (seulement si c'est l'affichage principal)
  if (!forcedDate) {
    document.getElementById('ctxDate').textContent =
      displayDate.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
    document.getElementById('ctxCount').textContent =
      `${rows.length} film${rows.length>1?'s':''} · ${rows.reduce((n,f)=>n+f._day.length,0)} séances`;
  }

  const cardsHtml = rows.map(film => {
    const poster   = film._poster || POSTER_FALLBACK;
    const meta     = [(film.genres||[])[0], film.realisateur, film.annee, film.duree ? film.duree + 'min' : null].filter(Boolean).join(' · ');
    const actors   = actorsTop3(film._cast);
    let slotRows;
    if (filtreCinema === 'tous') {
      // Mode multi-cinémas : grouper par cinéma, version inline sur le bouton
      const byCinema = {};
      film._day.forEach(s => {
        const c = s.cinema || film.cinema || '';
        if (!byCinema[c]) byCinema[c] = [];
        byCinema[c].push(s);
      });
      slotRows = Object.entries(byCinema).map(([cinema, seances]) => {
        const label = SHORT_CINEMA[cinema] || cinema;
        const btns = seances.map(s => {
          const soon = isTod && isSoon(s.h);
          const past = isTod && isPast(s.h);
          const cls = past ? 'past' : (soon ? 'soon' : '');
          const aria = 'Réserver ' + s.h + ' ' + cinema + ' — ' + film.titre;
          return '<button type="button" class="card-time-btn ' + cls + '" aria-label="' + escAttr(aria) + '" onclick="event.stopPropagation();openFilm(\'' + esc(film.titre) + '\')">' + s.h + '<span class="slot-ver">' + s.v + '</span></button>';
        }).join('');
        return '<div class="card-slot-row"><div class="card-cinema-chip">' + escHtml(label) + '</div>' + btns + '</div>';
      }).join('');
    } else {
      // Mode cinéma unique : grouper par version (comportement actuel)
      const byVer = {};
      film._day.forEach(s => {
        if (!byVer[s.v]) byVer[s.v] = [];
        byVer[s.v].push(s);
      });
      const verOrder = ['VOSTFR','VF','VO','VFST'];
      slotRows = verOrder.filter(v => byVer[v]).map(v => {
        const seances = byVer[v];
        const btns = seances.map(s => {
          const soon = isTod && isSoon(s.h);
          const past = isTod && isPast(s.h);
          const cls = past ? 'past' : (soon ? 'soon' : '');
          const aria = 'Réserver ' + s.h + ' — ' + film.titre;
          return '<button type="button" class="card-time-btn ' + cls + '" aria-label="' + escAttr(aria) + '" onclick="event.stopPropagation();openFilm(\'' + esc(film.titre) + '\')">' + s.h + '</button>';
        }).join('');
        return '<div class="card-slot-row"><div class="card-lang-chip">' + v + '</div>' + btns + '</div>';
      }).join('');
    }

    return `<div class="film-card fade" data-t="${escAttr(film.titre)}" onclick="openFilm('${esc(film.titre)}')">
      <div class="card-poster-wrap">
        <img class="card-poster" src="${poster}" alt="Affiche — ${escAttr(film.titre)}" loading="lazy" onerror="this.src='${POSTER_FALLBACK}'" />
      </div>
      <div class="card-body">
        <div class="card-header">
          <div class="card-title">${film.titre}</div>
          <div class="card-meta">${meta}</div>
          ${actors ? `<div class="card-actors">${escHtml(actors)}</div>` : ''}
        </div>
        <div class="card-slots">${slotRows}</div>
      </div>
    </div>`;
  }).join('');

  if (forcedDate) {
    // Append au contenu existant (mode "demain après message")
    container.innerHTML += cardsHtml;
  } else {
    container.innerHTML = cardsHtml;
    container.classList.remove('hidden');
  }
}

function jumpToTomorrow() {
  const today = new Date(); today.setHours(0,0,0,0);
  const tomorrow = addDays(today, 1);
  // Activer la pill du lendemain
  const pills = document.querySelectorAll('.d-pill');
  pills.forEach(p => p.classList.remove('active'));
  if (pills[1]) pills[1].classList.add('active');
  selDate = tomorrow;
  renderFilms(allFilms);
}

// ═══════════════════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════════════════
function openFilm(titre) {
  let film;
  if (filtreCinema === 'tous') {
    const key = normalizeTitle(titre);
    const matches = allFilms.filter(f => normalizeTitle(f.titre) === key);
    if (!matches.length) return;
    film = { ...matches[0], _sd: matches.flatMap(f => f._sd) };
    for (const m of matches) {
      if (!film._poster   && m._poster)   film._poster   = m._poster;
      if (!film._synopsis && m._synopsis) film._synopsis = m._synopsis;
      if (!film._cast     && m._cast)     film._cast     = m._cast;
      if (!film.note      && m.note)      film.note      = m.note;
      if (!film.genres?.length && m.genres?.length) film.genres = m.genres;
    }
  } else {
    film = allFilms.find(f => f.titre === titre);
  }
  if (!film) return;

  document.querySelectorAll('.film-card').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.film-card').forEach(c => {
    if (normalizeTitle(c.dataset.t) === normalizeTitle(titre)) c.classList.add('active');
  });

  renderDetail(film);

  if (window.innerWidth <= 820) {
    const side = document.getElementById('sidePanel');
    side.classList.add('open');
    document.getElementById('mTabs').classList.add('hidden');
    document.querySelector('.m-back')?.remove();
    const back = document.createElement('div');
    back.className = 'm-back';
    back.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>&nbsp;Retour`;
    back.onclick = () => { side.classList.remove('open'); document.getElementById('mTabs').classList.remove('hidden'); back.remove(); };
    side.prepend(back);
    side.scrollTo(0,0); window.scrollTo(0,0);
  }
}

function renderDetail(film) {
  const poster = film._poster || null;
  const note   = film.note ? film.note.toFixed(1) : null;
  const cast   = film._cast    || '';
  const synop  = film._synopsis || film.synopsis;
  const today  = new Date(); today.setHours(0,0,0,0);

  // Grouper par jour puis par cinéma (si plusieurs cinémas)
  const byDay = {};
  film._sd.forEach(s => {
    const k = dKey(s.date);
    if (!byDay[k]) byDay[k] = {date:s.date, seances:[]};
    byDay[k].seances.push(s);
  });
  const cinemas = [...new Set(film._sd.map(s => s.cinema).filter(Boolean))];
  const multiCinema = cinemas.length > 1;
  const weekHtml = Object.values(byDay)
    .sort((a,b) => a.date-b.date)
    .map(({date,seances}) => {
      const isTod = sameDay(date,today);
      const lbl = isTod ? "Aujourd'hui" : date.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'short'});
      let content;
      if (multiCinema) {
        const byCinema = {};
        seances.forEach(s => {
          const c = s.cinema || 'Le Comoedia';
          if (!byCinema[c]) byCinema[c] = [];
          byCinema[c].push(s);
        });
        content = Object.entries(byCinema)
          .sort(([a],[b]) => (SHORT_CINEMA[a]||a).localeCompare(SHORT_CINEMA[b]||b))
          .map(([cinema, sess]) => {
            const short = SHORT_CINEMA[cinema] || cinema;
            const chips = sess.sort((a,b)=>a.h.localeCompare(b.h)).map(s => {
              const past=isTod&&isPast(s.h), soon=isTod&&isSoon(s.h);
              return `<span class="d-chip${past?' past':''}${soon?' soon':''}">${s.h}<span class="cv">${s.v}</span></span>`;
            }).join('');
            return `<div class="d-day-row"><span class="d-cine-tag">${short}</span><span class="d-chips">${chips}</span></div>`;
          }).join('');
      } else {
        const chips = seances.sort((a,b)=>a.h.localeCompare(b.h)).map(s => {
          const past=isTod&&isPast(s.h), soon=isTod&&isSoon(s.h);
          return `<div class="d-chip${past?' past':''}${soon?' soon':''}">${s.h}<span class="cv">${s.v}</span></div>`;
        }).join('');
        content = `<div class="d-chips">${chips}</div>`;
      }
      return `<div class="d-day"><div class="d-day-lbl">${lbl}</div>${content}</div>`;
    }).join('');

  document.getElementById('detailEmpty').classList.add('hidden');
  const el = document.getElementById('detailContent');
  el.classList.remove('hidden');
  el.innerHTML = `
    <div class="d-hero fade">
      ${poster
        ? `<img class="d-back" src="${poster}" alt="" style="filter:brightness(.35) saturate(.6) blur(4px);transform:scale(1.05);" />`
        : `<div class="d-back-ph" style="background:${film.color}"></div>`}
      ${note ? `<div class="d-score"><span class="d-score-num">${note}</span><span class="d-score-lbl">IMDb</span></div>` : ''}
    </div>
    <div class="d-body fade">
      <div class="d-title">${film.titre}</div>
      ${film.titreOriginal !== film.titre ? `<div class="d-orig">${film.titreOriginal}</div>` : ''}
      <div class="d-crew">
        <div class="d-ci"><span class="lbl">Réalisation</span><span class="val">${film.realisateur}</span></div>
        <div class="d-ci"><span class="lbl">Année</span><span class="val">${film.annee}</span></div>
        <div class="d-ci"><span class="lbl">Durée</span><span class="val">${film.duree} min</span></div>
        ${cast ? `<div class="d-ci"><span class="lbl">Avec</span><span class="val">${cast}</span></div>` : ''}
      </div>
      <div class="d-genres">${(film.genres||[]).map(g=>`<span class="d-genre">${g}</span>`).join('')}</div>
      <p class="d-synopsis">${synop}</p>
      <div class="d-week-lbl">Séances de la semaine</div>
      ${weekHtml}
    </div>`;
}

// ═══════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════
function renderEvents() {
  document.getElementById('eventsList').innerHTML = EVENTS_DATA.map(e => `
    <div class="ev">
      <div class="ev-date"><span class="ev-n">${e.jour}</span><span class="ev-m">${e.mois}</span></div>
      <div class="ev-info">
        <div class="ev-type" style="color:${e.color}">${e.type}</div>
        <div class="ev-title">${e.titre}</div>
        <div class="ev-desc">${e.desc}</div>
        <div class="ev-meta"><span>🕐 ${e.heure}</span><span>📍 ${e.lieu}</span></div>
      </div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════
function swTab(t) {
  document.getElementById('secSeances').classList.toggle('hidden', t!=='seances');
  document.getElementById('secEvents') .classList.toggle('hidden', t!=='events');
  document.getElementById('tabS').classList.toggle('active', t==='seances');
  document.getElementById('tabE').classList.toggle('active', t==='events');
  document.getElementById('sidePanel').classList.toggle('hidden', t==='events');
}
function mTab(t, btn) {
  swTab(t);
  document.querySelectorAll('.m-tabs .tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
async function boot() {
  renderEvents();
  buildCinemaBar();
  try {
    allFilms = await loadAll();
  } catch(e) {
    const today = new Date(); today.setHours(0,0,0,0);
    allFilms = FILMS_DATA.map(f => ({
      ...f,
      cinema: f.cinema || 'Le Comoedia',
      _sd: f.seances.map(s => ({...s, date: addDays(today, s.j)})),
    }));
  }
  document.getElementById('skeletons').remove();
  buildPills(allFilms);
  renderFilms(allFilms);
}

boot();
</script>
