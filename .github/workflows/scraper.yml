name: Scraper hebdomadaire Multi-Cinémas Lyon

on:
  schedule:
    - cron: '0 1 * * 3'  # Mercredi 1h00 UTC
  workflow_dispatch:
    inputs:
      pdf_url:
        description: 'URL directe du PDF Comoedia (laisser vide pour découverte automatique)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer le scraper
        env:
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          PDF_ARG=""
          if [ -n "${{ github.event.inputs.pdf_url }}" ]; then
            PDF_ARG="--pdf-url ${{ github.event.inputs.pdf_url }}"
          fi
          python3 scraper.py --output programme.json $PDF_ARG

      - name: Commit et push programme.json + pdf_state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f programme.json pdf_state.json
          git diff --cached --quiet || git commit -m "chore: mise à jour programme $(date '+%Y-%m-%d')"
          git push
